<div class="filtros-wrapper">
  <div class="filtro-container">
    <label for="orden">Ordenar por:</label>
    <select id="orden" (change)="onOrdenChange($event)" [value]="ordenSeleccionado">
      <option value="default">Por defecto</option>
      <option value="alfabetico_asc">Nombre (A-Z)</option>
      <option value="alfabetico_desc">Nombre (Z-A)</option>
    </select>
  </div>

  <div class="filtro-container" *ngIf="generos && generos.length > 0">
    <label for="genero">Filtrar por género:</label>
    <select id="genero" (change)="onGeneroChange($event)" [value]="generoSeleccionado">
      <option value="todos">Todos los géneros</option>
      <option *ngFor="let genero of generos" [value]="genero.name">{{ genero.name }} ({{ genero.count }})</option>
    </select>
  </div>

  <div class="filtro-container">
    <button (click)="irAElementoAleatorio()">{{ randomButtonText }}</button>
  </div>
</div>
