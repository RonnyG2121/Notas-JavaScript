<div class="login-container">
  <h2>Bienvenido a la Audiocinemateca</h2>
  <p>Para empezar, ingrese su usuario y contraseña:</p>

  <div class="form-group">
    <label for="username">Usuario:</label>
    <input type="text" id="username" name="username" [(ngModel)]="username">
  </div>

  <div class="form-group">
    <label for="password">Contraseña:</label>
    <input [type]="showPassword ? 'text' : 'password'" id="password" name="password" [(ngModel)]="password">
    <input type="checkbox" id="showPassword" [(ngModel)]="showPassword">
    <label for="showPassword">Mostrar contraseña</label>
  </div>

  <button (click)="onLogin()">Aceptar</button>

  @if(errorMessage) { <p class="error-message">{{ errorMessage }}</p> }
  @if(banMessage) { <p class="ban-message">{{ banMessage }}</p> }
</div>
