<div>
  <button (click)="volver()" class="volver-btn">← Volver a la lista</button>
  <h3>{{ cortometraje?.titulo }}</h3>
  <div class="detalle-container">
    <div class="video-reproductor">
      <audio controls autoplay>
        <source [src]="cortometraje?.enlace" type="audio/mpeg">
        Tu navegador no soporta el elemento de audio.
      </audio>
    </div>
    <div class="info-container">
      <p><strong>Año:</strong> {{ cortometraje?.anio }}</p>
      <p><strong>Director:</strong> {{ cortometraje?.director }}</p>
      <p><strong>Sinopsis:</strong> {{ cortometraje?.sinopsis }}</p>
    </div>
  </div>
</div>

<p *ngIf="isLoading">Cargando cortometraje...</p>
<p *ngIf="!isLoading && !cortometraje">Cortometraje no encontrado.</p>
