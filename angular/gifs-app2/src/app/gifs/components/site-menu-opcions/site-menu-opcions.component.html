<nav aria-label="Menú principal">
    <div class="flex flex-col relative w-screen">
        <div id="menu"
            class="bg-gray-900 min-h-screen z-10 text-slate-300 w-64 fixed left-0 h-screen overflow-y-scroll">

            <div id="nav" class="w-full px-6">
                @for (itemMenu of menuOptions; track itemMenu.route) {

                <a [routerLink]="itemMenu.route" routerLinkActive="bg-blue-800"
                    class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-white/5 transition ease-linear duration-150">
                    <div>
                        <i class="{{itemMenu.icon}}"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-lg font-bold leading-5 text-white">{{itemMenu.label}}</span>
                        <span class="text-sm text-white/50 hidden md:block">{{itemMenu.sublabel}}</span>
                    </div>
                </a>

                }

            </div>
        </div>
    </div>
</nav>

<nav>
    @for (key of gifsService.searchHistoryKeys(); track key) {
    <a [routerLink]="['/dashboard/history', key]" routerLinkActive="bg-blue-800"
        class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-white/5 transition ease-linear duration-150">
        <div>
            <!-- <i class="{{ item.icon }}"></i> -->
            <i class="fa-solid fa-clock-rotate-left"></i>
        </div>
        <div class="flex flex-col">
            <span class="text-lg font-bold leading-5 text-white">
                {{ key }}
            </span>
        </div>
    </a>
}

</nav>
